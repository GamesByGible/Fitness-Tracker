<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weekly Training Log</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- PWA: manifest + icons -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14171c">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14171c;
    --bg-raised: #1b1f26;
    --bg-card: #20242c;
    --line: #2c313a;
    --ink: #eef0f3;
    --ink-dim: #9aa3b0;
    --ink-faint: #5d6573;
    --accent: #f5a623;
    --accent-dim: #6b5326;
    --accent-ink: #1a1304;
    --done: #3ddc97;
    --done-dim: #1f4a3a;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(245,166,35,0.07), transparent 45%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 14px);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 28px 18px 100px;
  }

  .wrap{
    max-width: 560px;
    margin: 0 auto;
  }

  /* ---------- Header ---------- */
  .masthead{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .masthead .tag{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  h1{
    font-family: 'Archivo Black', sans-serif;
    font-size: 30px;
    line-height: 1;
    margin: 4px 0 22px;
    letter-spacing: -0.01em;
  }

  /* ---------- Week nav card ---------- */
  .week-card{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 18px 16px;
    margin-bottom: 18px;
  }

  .week-nav{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
  }
  .week-nav button{
    background: var(--bg-raised);
    border: 1px solid var(--line);
    color: var(--ink-dim);
    width: 34px; height: 34px;
    border-radius: 9px;
    font-size: 16px;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink: 0;
    transition: border-color .15s, color .15s;
  }
  .week-nav button:hover{ border-color: var(--accent); color: var(--accent); }
  .week-nav button:disabled{ opacity: .35; cursor: default; }
  .week-nav button:disabled:hover{ border-color: var(--line); color: var(--ink-dim); }

  .week-label{
    text-align:center;
    flex: 1;
  }
  .week-range{
    font-weight: 600;
    font-size: 15px;
  }
  .week-sub{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }
  .current-pill{
    display:inline-block;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-ink);
    background: var(--accent);
    padding: 2px 8px;
    border-radius: 100px;
  }

  /* ---------- Progress bar (signature element) ---------- */
  .progress-strip{
    display: flex;
    gap: 4px;
    margin-top: 16px;
  }
  .progress-seg{
    flex: 1;
    height: 8px;
    border-radius: 4px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    overflow: hidden;
    position: relative;
  }
  .progress-seg.filled{
    background: var(--done);
    border-color: var(--done);
  }
  .progress-caption{
    display:flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
  }
  .progress-caption .count{ color: var(--ink-dim); }
  .progress-caption .count b{ color: var(--done); font-weight:600; }

  /* ---------- Checklist ---------- */
  .checklist{
    display:flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .item{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    display:flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .item:hover{ border-color: #3a4150; }
  .item.done{
    background: linear-gradient(180deg, rgba(61,220,151,0.07), rgba(61,220,151,0.02));
    border-color: var(--done-dim);
  }

  .checkbox{
    width: 26px; height: 26px;
    border-radius: 8px;
    border: 2px solid var(--ink-faint);
    flex-shrink: 0;
    display:flex; align-items:center; justify-content:center;
    transition: border-color .15s, background .15s;
  }
  .item.done .checkbox{
    background: var(--done);
    border-color: var(--done);
  }
  .checkbox svg{
    width: 15px; height: 15px;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity .15s, transform .15s;
  }
  .item.done .checkbox svg{ opacity: 1; transform: scale(1); }

  .item-body{ flex: 1; min-width: 0; }
  .item-name{
    font-weight: 600;
    font-size: 15px;
    line-height: 1.3;
  }
  .item.done .item-name{ color: var(--ink-dim); text-decoration: line-through; text-decoration-color: var(--ink-faint); text-decoration-thickness: 1.5px; }

  .item-meta{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }
  .item.done .item-meta{ color: var(--done); }

  .item-kind{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 3px 8px;
    flex-shrink: 0;
  }

  /* ---------- History ---------- */
  .section-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 30px 0 12px 4px;
  }

  .history-list{
    display:flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-row{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 13px 16px;
    cursor: pointer;
    display:flex;
    align-items: center;
    gap: 12px;
    transition: border-color .15s;
  }
  .history-row:hover{ border-color: #3a4150; }
  .history-range{
    flex: 1;
    font-size: 14px;
    font-weight: 500;
  }
  .history-stat{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-faint);
  }
  .history-stat.complete{ color: var(--done); }
  .history-dots{
    display:flex;
    gap: 3px;
  }
  .history-dots span{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--line);
  }
  .history-dots span.on{ background: var(--done); }

  .empty-history{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-faint);
    padding: 14px 4px;
  }

  footer{
    text-align:center;
    margin-top: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 6px;
    background: rgba(20,23,28,0.88);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--line);
    padding: 10px max(14px, env(safe-area-inset-left)) calc(10px + env(safe-area-inset-bottom));
    z-index: 50;
  }
  .nav-btn{
    background: none;
    border: none;
    color: var(--ink-faint);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 6px 28px;
    border-radius: 12px;
    cursor: pointer;
    transition: color .15s, background .15s;
  }
  .nav-btn svg{ width: 21px; height: 21px; }
  .nav-btn.active{ color: var(--accent); background: rgba(245,166,35,0.1); }
  .nav-btn:not(.active):hover{ color: var(--ink-dim); }

  /* ---------- Workout tiles ---------- */
  .workout-tiles{
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tile{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .tile.open{ border-color: var(--accent-dim); }

  .tile-head{
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    cursor: pointer;
    user-select: none;
  }
  .tile-icon{
    width: 38px; height: 38px;
    border-radius: 10px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
  }
  .tile-icon svg{ width: 19px; height: 19px; }

  .tile-info{ flex: 1; min-width: 0; }
  .tile-name{ font-weight: 600; font-size: 15px; line-height: 1.3; }
  .tile-sub{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 3px;
  }

  .tile-chevron{
    color: var(--ink-faint);
    flex-shrink: 0;
    transition: transform .2s;
    display: flex;
  }
  .tile.open .tile-chevron{ transform: rotate(180deg); color: var(--accent); }

  .tile-body{
    max-height: 0;
    overflow: hidden;
    transition: max-height .25s ease;
  }
  .tile.open .tile-body{ max-height: 600px; }

  .tile-body-inner{
    padding: 0 16px 18px;
    border-top: 1px solid var(--line);
    margin-top: 0;
    padding-top: 14px;
  }
  .tile-summary{
    font-size: 13px;
    color: var(--ink-dim);
    margin: 0 0 12px;
    line-height: 1.5;
  }
  .tile-steps{
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .tile-steps li{
    display: flex;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
  }
  .tile-steps li .step-num{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
    width: 18px;
    padding-top: 2px;
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- ===== TRACKER PAGE ===== -->
  <div class="page" id="page-tracker">
    <div class="masthead">
      <div class="tag">Training Log</div>
    </div>
    <h1>Weekly Activity</h1>

    <div class="week-card">
      <div class="week-nav">
        <button id="prevWeek" aria-label="Previous week">&#8592;</button>
        <div class="week-label">
          <div class="week-range" id="weekRange">—</div>
          <div class="week-sub" id="weekSub">—</div>
          <div id="currentPillSlot"></div>
        </div>
        <button id="nextWeek" aria-label="Next week">&#8594;</button>
      </div>

      <div class="progress-strip" id="progressStrip"></div>
      <div class="progress-caption">
        <span id="progressText">0 / 4 done</span>
        <span class="count" id="progressCount"></span>
      </div>
    </div>

    <div class="checklist" id="checklist"></div>

    <div class="section-label">History</div>
    <div class="history-list" id="historyList"></div>

    <footer>STORED LOCALLY ON THIS DEVICE — NO ACCOUNT NEEDED</footer>
  </div>

  <!-- ===== WORKOUTS PAGE ===== -->
  <div class="page" id="page-workouts" hidden>
    <div class="masthead">
      <div class="tag">Reference</div>
    </div>
    <h1>Workouts</h1>
    <div class="workout-tiles" id="workoutTiles"></div>
    <footer>TAP A WORKOUT TO VIEW INSTRUCTIONS</footer>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn active" data-page="tracker">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    <span>Tracker</span>
  </button>
  <button class="nav-btn" data-page="workouts">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11v11h-11z"></path><path d="M2 9.5h2.5M2 14.5h2.5M19.5 9.5H22M19.5 14.5H22M9.5 2v2.5M14.5 2v2.5M9.5 19.5V22M14.5 19.5V22"></path></svg>
    <span>Workouts</span>
  </button>
</nav>

<script>
(function(){

  const WORKOUTS = [
    {
      id: 'run30',
      name: '30m Run',
      kind: 'Cardio',
      duration: '30 min',
      instructions: {
        summary: 'Steady run with a cooldown walk to finish.',
        steps: [
          'Run for 30 minutes, aiming for around 5km.',
          'Finish with a cooldown walk.'
        ]
      }
    },
    {
      id: 'hiitRow',
      name: '20m HIIT — Rowing',
      kind: 'HIIT',
      duration: '20 min',
      instructions: {
        summary: '8 rounds of max-effort rowing with equal recovery.',
        steps: [
          'Warm up for 3 minutes.',
          'Perform 8 rounds of: 1 minute maximum effort, then 1 minute easy recovery rowing.',
          'Cool down for 1 minute.'
        ]
      }
    },
    {
      id: 'hiitBike',
      name: '20m HIIT — Cycling',
      kind: 'HIIT',
      duration: '20 min',
      instructions: {
        summary: '8 rounds of max-effort cycling with equal recovery.',
        steps: [
          'Warm up for 3 minutes.',
          'Perform 8 rounds of: 1 minute maximum effort, then 1 minute easy recovery pedalling.',
          'Cool down for 1 minute.'
        ]
      }
    },
    {
      id: 'dumbbell',
      name: '20m Dumbbell Workout',
      kind: 'Strength',
      duration: '20 min',
      instructions: {
        summary: '4-exercise loop, repeated 3 times, 10–12 reps each.',
        steps: [
          'Dumbbell squats — 10 to 12 reps.',
          'Dumbbell chest press, lying on the floor — 10 to 12 reps.',
          'Dumbbell reverse lunges — 10 to 12 reps.',
          'Bent-over dumbbell rows — 10 to 12 reps.',
          'Repeat the full loop 3 times.'
        ]
      }
    },
  ];

  const STORAGE_KEY = 'weeklyTrainingLog.v1';

  // ---------- Date / week helpers ----------
  // Weeks start on Monday.
  function startOfWeek(d){
    const date = new Date(d);
    date.setHours(0,0,0,0);
    const day = date.getDay(); // 0 = Sunday
    const diff = (day === 0 ? -6 : 1 - day);
    date.setDate(date.getDate() + diff);
    return date;
  }

  function addDays(d, n){
    const date = new Date(d);
    date.setDate(date.getDate() + n);
    return date;
  }

  function isoDate(d){
    const date = new Date(d);
    date.setHours(0,0,0,0);
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const day = String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function weekKey(weekStartDate){
    return isoDate(weekStartDate);
  }

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function formatRange(weekStart){
    const weekEnd = addDays(weekStart, 6);
    const sameMonth = weekStart.getMonth() === weekEnd.getMonth();
    const startStr = `${weekStart.getDate()} ${MONTHS[weekStart.getMonth()]}`;
    const endStr = sameMonth
      ? `${weekEnd.getDate()} ${MONTHS[weekEnd.getMonth()]}`
      : `${weekEnd.getDate()} ${MONTHS[weekEnd.getMonth()]}`;
    return `${startStr} – ${endStr}`;
  }

  function formatYear(weekStart){
    return String(weekStart.getFullYear());
  }

  function formatTickedDate(iso){
    const d = new Date(iso + 'T00:00:00');
    return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
  }

  // ---------- Storage ----------
  function loadAll(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    }catch(e){
      console.error('Failed to load training log', e);
      return {};
    }
  }

  function saveAll(data){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }catch(e){
      console.error('Failed to save training log', e);
    }
  }

  let store = loadAll();

  function getWeekData(key){
    if (!store[key]){
      store[key] = {};
    }
    return store[key];
  }

  // ---------- State ----------
  const realToday = new Date();
  const realCurrentWeekStart = startOfWeek(realToday);
  let viewedWeekStart = new Date(realCurrentWeekStart);

  // ---------- Rendering ----------
  const weekRangeEl = document.getElementById('weekRange');
  const weekSubEl = document.getElementById('weekSub');
  const pillSlot = document.getElementById('currentPillSlot');
  const checklistEl = document.getElementById('checklist');
  const progressStripEl = document.getElementById('progressStrip');
  const progressTextEl = document.getElementById('progressText');
  const progressCountEl = document.getElementById('progressCount');
  const historyListEl = document.getElementById('historyList');
  const nextBtn = document.getElementById('nextWeek');

  function checkIcon(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="#14171c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
  }

  function kindIcon(kind){
    if (kind === 'Cardio'){
      // running figure-ish / pulse
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"></path></svg>';
    }
    if (kind === 'HIIT'){
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 11 14 9 22 21 10 13 10 13 2"></polygon></svg>';
    }
    // Strength
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5v11M17.5 6.5v11M3 9.5h2M3 14.5h2M19 9.5h2M19 14.5h2M6.5 12h11"></path></svg>';
  }

  function chevronIcon(){
    return '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';
  }

  function render(){
    const key = weekKey(viewedWeekStart);
    const weekData = getWeekData(key);
    const isCurrent = key === weekKey(realCurrentWeekStart);

    weekRangeEl.textContent = formatRange(viewedWeekStart);
    weekSubEl.textContent = formatYear(viewedWeekStart);
    pillSlot.innerHTML = isCurrent ? '<span class="current-pill">This week</span>' : '';

    nextBtn.disabled = viewedWeekStart.getTime() >= realCurrentWeekStart.getTime();

    // Checklist
    checklistEl.innerHTML = '';
    let doneCount = 0;

    WORKOUTS.forEach(w => {
      const completedOn = weekData[w.id] || null;
      if (completedOn) doneCount++;

      const item = document.createElement('div');
      item.className = 'item' + (completedOn ? ' done' : '');
      item.setAttribute('role', 'checkbox');
      item.setAttribute('aria-checked', completedOn ? 'true' : 'false');
      item.tabIndex = 0;

      item.innerHTML = `
        <div class="checkbox">${checkIcon()}</div>
        <div class="item-body">
          <div class="item-name">${w.name}</div>
          <div class="item-meta">${completedOn ? 'Done ' + formatTickedDate(completedOn) : 'Not done yet'}</div>
        </div>
        <div class="item-kind">${w.kind}</div>
      `;

      const toggle = () => {
        const wd = getWeekData(key);
        if (wd[w.id]){
          delete wd[w.id];
        } else {
          // Use real today's date for the tick, regardless of which week is being viewed,
          // since that's when the action actually happened.
          wd[w.id] = isoDate(realToday);
        }
        saveAll(store);
        render();
      };

      item.addEventListener('click', toggle);
      item.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          toggle();
        }
      });

      checklistEl.appendChild(item);
    });

    // Progress strip
    progressStripEl.innerHTML = '';
    WORKOUTS.forEach(w => {
      const seg = document.createElement('div');
      seg.className = 'progress-seg' + (weekData[w.id] ? ' filled' : '');
      progressStripEl.appendChild(seg);
    });
    progressTextEl.textContent = `${doneCount} / ${WORKOUTS.length} done`;
    progressCountEl.innerHTML = doneCount === WORKOUTS.length
      ? '<b>Week complete</b>'
      : '';

    renderHistory(key);
  }

  function renderHistory(currentKey){
    const keys = Object.keys(store)
      .filter(k => k !== currentKey)
      .filter(k => Object.keys(store[k]).length > 0) // only weeks with some activity
      .sort((a,b) => b.localeCompare(a)); // newest first

    historyListEl.innerHTML = '';

    if (keys.length === 0){
      historyListEl.innerHTML = '<div class="empty-history">No past weeks logged yet. Completed weeks will show up here.</div>';
      return;
    }

    keys.forEach(k => {
      const weekStart = new Date(k + 'T00:00:00');
      const wd = store[k];
      const doneCount = WORKOUTS.filter(w => wd[w.id]).length;
      const complete = doneCount === WORKOUTS.length;

      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `
        <div class="history-dots">
          ${WORKOUTS.map(w => `<span class="${wd[w.id] ? 'on' : ''}"></span>`).join('')}
        </div>
        <div class="history-range">${formatRange(weekStart)}</div>
        <div class="history-stat ${complete ? 'complete' : ''}">${doneCount}/${WORKOUTS.length}</div>
      `;
      row.addEventListener('click', () => {
        viewedWeekStart = weekStart;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      historyListEl.appendChild(row);
    });
  }

  document.getElementById('prevWeek').addEventListener('click', () => {
    viewedWeekStart = addDays(viewedWeekStart, -7);
    render();
  });

  document.getElementById('nextWeek').addEventListener('click', () => {
    if (viewedWeekStart.getTime() < realCurrentWeekStart.getTime()){
      viewedWeekStart = addDays(viewedWeekStart, 7);
      render();
    }
  });

  // ---------- Workouts page ----------
  const workoutTilesEl = document.getElementById('workoutTiles');
  let openTileId = null;

  function renderWorkoutTiles(){
    workoutTilesEl.innerHTML = '';

    WORKOUTS.forEach(w => {
      const isOpen = openTileId === w.id;

      const tile = document.createElement('div');
      tile.className = 'tile' + (isOpen ? ' open' : '');

      const stepsHtml = w.instructions.steps.map((s, i) => `
        <li><span class="step-num">${String(i+1).padStart(2,'0')}</span><span>${s}</span></li>
      `).join('');

      tile.innerHTML = `
        <div class="tile-head">
          <div class="tile-icon">${kindIcon(w.kind)}</div>
          <div class="tile-info">
            <div class="tile-name">${w.name}</div>
            <div class="tile-sub">${w.kind} · ${w.duration}</div>
          </div>
          <div class="tile-chevron">${chevronIcon()}</div>
        </div>
        <div class="tile-body">
          <div class="tile-body-inner">
            <p class="tile-summary">${w.instructions.summary}</p>
            <ol class="tile-steps">${stepsHtml}</ol>
          </div>
        </div>
      `;

      tile.querySelector('.tile-head').addEventListener('click', () => {
        openTileId = isOpen ? null : w.id;
        renderWorkoutTiles();
      });

      workoutTilesEl.appendChild(tile);
    });
  }

  // ---------- Page navigation ----------
  const pages = {
    tracker: document.getElementById('page-tracker'),
    workouts: document.getElementById('page-workouts'),
  };
  const navBtns = document.querySelectorAll('.nav-btn');

  function showPage(name){
    Object.entries(pages).forEach(([key, el]) => {
      el.hidden = key !== name;
    });
    navBtns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.page === name);
    });
    window.scrollTo({ top: 0 });
  }

  navBtns.forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.page));
  });

  render();
  renderWorkoutTiles();

})();
</script>

</body>
</html>
